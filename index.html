<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Documentos - Posto de Combustível</title>
    
    <!-- Biblioteca de Criptografia AES (Para Proteção de Senha) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --primary-color: #1f4e78;
            --bg-light: #f9fbfd;
            --border-color: #d9d9d9;
            --row-group-bg: #eaeaea;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        /* Cabeçalho */
        .sheet-header { margin-bottom: 25px; }
        .header-table { width: 100%; border-collapse: collapse; border: none; margin-bottom: 10px; }
        .header-table td { border: none; padding: 0; vertical-align: middle; }
        .header-img-left { width: 25%; text-align: left; }
        .header-title-cell { width: 50%; text-align: center; }
        .header-img-right { width: 25%; text-align: right; }
        .sheet-header h2 { margin: 0; color: var(--primary-color); font-size: 1.2em; }
        .sheet-header h3 { margin: 5px 0 0 0; font-weight: normal; color: #555; font-size: 1.2em; text-align: center; }
        .notificacao-input {
            font-size: 1em; font-weight: bold; color: var(--primary-color); border: none;
            border-bottom: 2px dashed #999; text-align: left; width: 280px; background: transparent; padding-left: 4px;
        }
        .notificacao-input:focus { outline: none; border-bottom: 2px solid var(--primary-color); }
        .print-notificacao { display: none; }
        .header-img { height: 60px; max-width: 100%; object-fit: contain; }
        
        /* Campos da Empresa */
        .info-grid {
            display: table; width: 100%; margin-bottom: 25px; border: 1px solid var(--border-color);
            background-color: var(--bg-light); box-sizing: border-box;
        }
        .info-row { display: table-row; }
        .info-cell { display: table-cell; padding: 10px; font-size: 0.95em; vertical-align: middle; }
        .info-cell label { font-weight: bold; color: #444; }
        .info-cell input { width: 80%; border: none; background: transparent; border-bottom: 1px dashed #999; padding: 2px 5px; font-size: 1em; }
        .info-cell input:focus { outline: none; border-bottom: 1px solid var(--primary-color); }
        
        /* Painéis de Lançamento */
        .management-sections { display: table; width: 100%; margin-bottom: 30px; }
        .management-row { display: table-row; }
        .panel-cell { display: table-cell; width: 33.33%; padding-right: 20px; vertical-align: top; }
        .panel-cell:last-child { width: 66.66%; padding-right: 0; }
        .panel { background: #fff; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); height: 100%; box-sizing: border-box; }
        .panel h4 { margin-top: 0; margin-bottom: 15px; color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .form-table-grid { width: 100%; border-collapse: collapse; border: none; }
        .form-table-grid td { border: none; padding: 0 5px; vertical-align: top; }
        .form-table-grid td:first-child { padding-left: 0; }
        .form-table-grid td:last-child { padding-right: 0; }
        
        /* Botões */
        button { background-color: var(--primary-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        .btn-danger { background-color: #c0392b; }
        .btn-success { background-color: #27ae60; }
        .btn-edit { background-color: #f39c12; color: #fff; }
        .btn-edit-mode { background-color: #f39c12 !important; color: #fff !important; }
        .btn-report { background-color: #8e44ad; color: #fff; }
        
        .toolbar { text-align: right; margin-bottom: 15px; }
        .toolbar button { margin-left: 10px; }

        /* Painel de Opções Adicionais */
        .options-panel {
            background: #fff; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border-color);
            border-radius: 6px; display: flex; align-items: center; gap: 20px; font-size: 0.9em; font-weight: bold; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .options-panel label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .panel-divider { border-left: 1px solid #ddd; height: 25px; }
        .select-compare { padding: 3px; font-size: 0.9em; border-radius: 4px; border: 1px solid #888; font-weight: normal; margin-left: 15px; }

        /* Tabela Principal */
        table.main-sheet-table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 15px; }
        table.main-sheet-table th, table.main-sheet-table td { border: 1px solid #7f7f7f; padding: 6px 4px; text-align: center; }
        table.main-sheet-table th { background-color: #f2f2f2; color: #000; font-weight: bold; vertical-align: middle; }
        table.main-sheet-table tr.product-header-row td { background-color: var(--row-group-bg); text-align: left !important; font-weight: bold; font-size: 1.05em; letter-spacing: 0.5px; padding-left: 10px !important; }
        
        .linha-incompleta { background-color: #ffe6e6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .media-row { background-color: #fdfdfd; font-weight: bold; }
        .media-row td { border-top: 2px solid #555; border-bottom: 2px solid #555; }
        .actions-cell { border: none !important; background: transparent !important; white-space: nowrap; }
        
        @media print {
            @page { margin: 15mm 10mm; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .no-print { display: none !important; }
            .info-cell input { border-bottom: none; }
            .notificacao-input { display: none !important; }
            .print-notificacao { display: inline !important; }
            table.main-sheet-table { font-size: 9pt; }
            thead { display: table-row-group; }
            table.main-sheet-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            table.main-sheet-table tr.product-header-row td { background-color: #e5e5e5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .media-row td { border-top: 2px solid #000; border-bottom: 2px solid #000; }
            .linha-incompleta { background-color: #ffe6e6 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sheet-header">
        <table class="header-table">
            <tr>
                <td class="header-img-left"><img src="image 01.png" alt="Logo Esquerda" class="header-img"></td>
                <td class="header-title-cell">
                    <h2>Análise de Documentos Relativo a Notificação</h2>
                    <div style="margin-top: 8px; font-size: 1.1em; font-weight: bold; color: var(--primary-color);">
                        n° <span id="notificacaoNumSpan" class="print-notificacao"></span><input type="text" id="notificacaoNum" class="notificacao-input no-print" placeholder="Ex: 423/2026">
                    </div>
                </td>
                <td class="header-img-right"><img src="image 02.png" alt="Logo Direita" class="header-img"></td>
            </tr>
        </table>
        <h3>Dados do Estabelecimento Comercial</h3>
    </div>

    <div class="info-grid">
        <div class="info-row">
            <div class="info-cell" style="width: 50%;"><label>Razão Social: </label><input type="text" id="razaoSocial" value=""></div>
            <div class="info-cell" style="width: 50%;"><label>CNPJ n°: </label><input type="text" id="cnpj" value=""></div>
        </div>
        <div class="info-row">
            <div class="info-cell" colspan="2"><label>Endereço: </label><input type="text" id="endereco" value="" style="width: 90%;"></div>
        </div>
        <div class="info-row">
            <div class="info-cell" style="width: 50%;"><label>Contato: </label><input type="text" id="contato" value=""></div>
            <div class="info-cell" style="width: 50%;"><label>Produto: </label><input type="text" id="produtoHeader" value=""></div>
        </div>
    </div>

    <div class="management-sections no-print">
        <div class="management-row">
            <div class="panel-cell">
                <div class="panel">
                    <h4>1. Cadastrar Produto</h4>
                    <form id="productForm">
                        <div class="form-group">
                            <label>Descrição do Produto (Ex: GASOLINA COMUM)</label>
                            <input type="text" id="newProductName" required placeholder="Digite em maiúsculas...">
                        </div>
                        <button type="submit" class="btn-success">Adicionar Produto</button>
                    </form>
                </div>
            </div>

            <div class="panel-cell">
                <div class="panel">
                    <h4>2. Lançar Período / Valores</h4>
                    <form id="entryForm">
                        <div class="form-group">
                            <label>Selecione o Produto Cadastrado</label>
                            <select id="selectProduct" required>
                                <option value="">-- Escolha o produto --</option>
                            </select>
                        </div>
                        
                        <table class="form-table-grid" style="margin-bottom: 10px;">
                            <tr>
                                <td style="width: 33.33%;">
                                    <div class="form-group"><label>Nº Doc / NF (Coluna 1)</label><input type="text" id="docId" required></div>
                                </td>
                                <td style="width: 33.33%;">
                                    <div class="form-group"><label>PERÍODO (Compra/Venda)</label><input type="text" id="periodo" placeholder="Ex: 02/02/2026" required></div>
                                </td>
                                <td style="width: 33.33%;">
                                    <div class="form-group"><label>PREÇO AQUISIÇÃO [A]</label><input type="number" id="aquisicao" step="0.0001"></div>
                                </td>
                            </tr>
                        </table>

                        <table class="form-table-grid">
                            <tr>
                                <td style="width: 33.33%;">
                                    <div class="form-group"><label>Preço do Frete [Opcional]</label><input type="number" id="frete" step="0.0001"></div>
                                </td>
                                <td style="width: 33.33%;">
                                    <div class="form-group"><label>PREÇO DE VENDA [B]</label><input type="number" id="venda" step="0.0001"></div>
                                </td>
                                <td style="width: 33.33%;">
                                    <div class="form-group"><label>Quant. Litros [Opcional]</label><input type="number" id="qtdLitros" step="0.01"></div>
                                </td>
                            </tr>
                        </table>
                        
                        <div style="margin-top: 15px;">
                            <button type="submit" id="btnSubmitEntry">Lançar Dados na Tabela</button>
                            <button type="button" class="btn-danger no-print" style="margin-left:10px; display:none;" id="btnCancelEdit" onclick="cancelarEdicao()">Cancelar Edição</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Painel de Opções Adicionais -->
    <div class="options-panel no-print">
        <label title="Aplica cores verde/vermelho indicando as maiores/menores margens.">
            <input type="checkbox" id="chkIndicador" onchange="atualizarTabela()"> 🎨 Indicador de Margem (Degradê)
        </label>
        
        <div class="panel-divider"></div>
        
        <label title="Ativa a coluna que multiplica os Litros lançados pela Margem Bruta (Lucro).">
            <input type="checkbox" id="chkQtdLitros" onchange="toggleQtdLitros()"> ⛽ Calcular Lucro p/ Litros
        </label>

        <div class="panel-divider"></div>

        <label title="Habilita a seleção de um período base no cabeçalho de cada produto para calcular a diferença de lucro.">
            <input type="checkbox" id="chkComparar" onchange="toggleComparar()"> ⚖️ Comparar Período
        </label>
    </div>

    <div class="toolbar no-print">
        <button type="button" class="btn-report" onclick="gerarRelatorio()">📊 Gerar Relatório</button>
        <button type="button" class="btn-success" onclick="salvarDados()">💾 Salvar Planilha</button>
        <button type="button" class="btn-edit" onclick="acionarImportacao()">📂 Importar Planilha</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importarDados(this)">
        <button type="button" class="btn-danger" onclick="limparTudo()">Limpar Tudo</button>
        <button type="button" onclick="window.print()">🖨️ Imprimir Planilha</button>
    </div>

    <table class="main-sheet-table">
        <thead id="sheetTableHead"></thead>
        <tbody id="sheetTableBody"></tbody>
    </table>
</div>

<script>
    // -------------------------------------------------------------------------
    // DECLARAÇÃO DE VARIÁVEIS GLOBAIS
    // -------------------------------------------------------------------------
    let bancoDados = [];
    let editandoInfo = null;

    const productForm = document.getElementById('productForm');
    const entryForm = document.getElementById('entryForm');
    const selectProduct = document.getElementById('selectProduct');
    const sheetTableHead = document.getElementById('sheetTableHead');
    const sheetTableBody = document.getElementById('sheetTableBody');
    const notificacaoInput = document.getElementById('notificacaoNum');
    const notificacaoSpan = document.getElementById('notificacaoNumSpan');

    // Sincroniza número da notificação
    notificacaoInput.addEventListener('input', function() {
        notificacaoSpan.textContent = this.value;
    });

    // -------------------------------------------------------------------------
    // FUNÇÕES DE LÓGICA E CÁLCULO GERAL
    // -------------------------------------------------------------------------
    function toggleComparar() {
        if (document.getElementById('chkComparar').checked) {
            document.getElementById('chkQtdLitros').checked = true;
        }
        atualizarTabela();
    }
    
    function toggleQtdLitros() {
        if (!document.getElementById('chkQtdLitros').checked) {
            document.getElementById('chkComparar').checked = false; 
        }
        atualizarTabela();
    }

    function getGradientStyle(val, min, max) {
        if (min === max || val === undefined || isNaN(val)) return '';
        let ratio = (val - min) / (max - min); 
        let hue = 120 - (ratio * 120); 
        return `background-color: hsl(${hue}, 80%, 85%) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;`;
    }

    function setPeriodoComparacao(nomeProduto, periodo) {
        const prod = bancoDados.find(p => p.nome === nomeProduto);
        if (prod) {
            prod.periodoComparacao = periodo;
            atualizarTabela();
        }
    }

    function parseDate(str) {
        if (!str) return 0;
        if (str.includes('/')) {
            const parts = str.split('/');
            if (parts.length === 3) {
                return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
            }
        } else if (str.includes('-')) {
            return new Date(str).getTime();
        }
        return 0;
    }

    function recalcularProduto(nomeProduto) {
        const prod = bancoDados.find(p => p.nome === nomeProduto);
        if (!prod || prod.linhas.length === 0) return;
        
        prod.linhas.sort((a, b) => parseDate(a.periodo) - parseDate(b.periodo));
        const margemBaseD = prod.linhas[0].margemD || 0;
        
        prod.linhas.forEach(l => {
            l.aumentoReducaoE = (l.margemD || 0) - margemBaseD;
            l.percentualReajuste = l.aquisicao > 0 ? (l.venda / l.aquisicao) - 1 : 0;
        });
    }

    // -------------------------------------------------------------------------
    // EVENTOS DOS FORMULÁRIOS (ADICIONAR E LANÇAR)
    // -------------------------------------------------------------------------
    productForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const productName = document.getElementById('newProductName').value.trim().toUpperCase();
        
        if (bancoDados.some(p => p.nome === productName)) {
            alert('Este produto já está cadastrado.');
            return;
        }

        bancoDados.push({ nome: productName, linhas: [], periodoComparacao: '' });
        atualizarDropdown();
        atualizarTabela();
        productForm.reset();
    });

    entryForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const produtoSelecionado = selectProduct.value;
        const docId = document.getElementById('docId').value;
        const periodo = document.getElementById('periodo').value;
        
        const aquisicaoStr = document.getElementById('aquisicao').value;
        const isAquisicaoVazia = (aquisicaoStr === '');
        const aquisicao = isAquisicaoVazia ? 0 : parseFloat(aquisicaoStr);
        
        const vendaStr = document.getElementById('venda').value;
        const isVendaVazia = (vendaStr === '');
        const venda = isVendaVazia ? 0 : parseFloat(vendaStr);
        
        const freteStr = document.getElementById('frete').value;
        const frete = (freteStr === '') ? 0 : parseFloat(freteStr);

        const qtdStr = document.getElementById('qtdLitros').value;
        const qtdLitros = (qtdStr === '') ? 0 : parseFloat(qtdStr);

        const produtoObj = bancoDados.find(p => p.nome === produtoSelecionado);
        if (!produtoObj) return;

        const lucroBrutoC = venda - aquisicao - frete;
        const margemD = venda > 0 ? (lucroBrutoC / venda) : 0;

        const novaLinha = {
            id: editandoInfo ? editandoInfo.idLinha : Date.now(),
            docId: docId,
            periodo: periodo,
            aquisicao: aquisicao,
            isAquisicaoVazia: isAquisicaoVazia,
            frete: frete,
            venda: venda,
            isVendaVazia: isVendaVazia,
            lucroBrutoC: lucroBrutoC,
            margemD: margemD,
            aumentoReducaoE: 0,
            percentualReajuste: 0,
            qtdLitros: qtdLitros
        };

        if (editandoInfo) {
            const prodAntigo = bancoDados.find(p => p.nome === editandoInfo.nomeProduto);
            const idxAntigo = prodAntigo.linhas.findIndex(l => l.id === editandoInfo.idLinha);

            if (produtoSelecionado !== editandoInfo.nomeProduto) {
                prodAntigo.linhas.splice(idxAntigo, 1);
                produtoObj.linhas.push(novaLinha);
            } else {
                prodAntigo.linhas[idxAntigo] = novaLinha;
            }
            
            recalcularProduto(editandoInfo.nomeProduto);
            cancelarEdicao(false);
        } else {
            produtoObj.linhas.push(novaLinha);
        }

        recalcularProduto(produtoSelecionado);
        atualizarTabela();
        
        document.getElementById('docId').value = '';
        document.getElementById('periodo').value = '';
        document.getElementById('aquisicao').value = '';
        document.getElementById('frete').value = '';
        document.getElementById('venda').value = '';
        document.getElementById('qtdLitros').value = '';
        document.getElementById('docId').focus();
    });

    // -------------------------------------------------------------------------
    // EDIÇÃO E EXCLUSÃO
    // -------------------------------------------------------------------------
    function editarLinha(nomeProduto, idLinha) {
        const prod = bancoDados.find(p => p.nome === nomeProduto);
        const font_linha = prod.linhas.find(l => l.id === idLinha);
        
        selectProduct.value = nomeProduto;
        document.getElementById('docId').value = font_linha.docId;
        document.getElementById('periodo').value = font_linha.periodo;
        document.getElementById('aquisicao').value = font_linha.isAquisicaoVazia ? '' : font_linha.aquisicao;
        document.getElementById('frete').value = font_linha.frete > 0 ? font_linha.frete : '';
        document.getElementById('venda').value = font_linha.isVendaVazia ? '' : font_linha.venda;
        document.getElementById('qtdLitros').value = (font_linha.qtdLitros && font_linha.qtdLitros > 0) ? font_linha.qtdLitros : '';
        
        editandoInfo = { nomeProduto, idLinha };
        document.getElementById('btnSubmitEntry').textContent = "Salvar Edição";
        document.getElementById('btnSubmitEntry').classList.add('btn-edit-mode');
        document.getElementById('btnCancelEdit').style.display = 'inline-block';
    }

    function cancelarEdicao(limparForm = true) {
        editandoInfo = null;
        document.getElementById('btnSubmitEntry').textContent = "Lançar Dados na Tabela";
        document.getElementById('btnSubmitEntry').classList.remove('btn-edit-mode');
        document.getElementById('btnCancelEdit').style.display = 'none';
        if(limparForm) document.getElementById('entryForm').reset();
    }

    function removerLinha(nomeProduto, idLinha) {
        if(confirm('Tem certeza que deseja apagar este lançamento?')) {
            const prod = bancoDados.find(p => p.nome === nomeProduto);
            if (prod) {
                prod.linhas = prod.linhas.filter(l => l.id !== idLinha);
                recalcularProduto(nomeProduto);
                atualizarTabela();
            }
        }
    }

    function atualizarDropdown() {
        selectProduct.innerHTML = '<option value="">-- Escolha o produto --</option>';
        bancoDados.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.nome;
            opt.textContent = p.nome;
            selectProduct.appendChild(opt);
        });
    }

    // -------------------------------------------------------------------------
    // RENDERIZAÇÃO DA TABELA (MOTOR PRINCIPAL)
    // -------------------------------------------------------------------------
    function atualizarTabela() {
        sheetTableHead.innerHTML = '';
        sheetTableBody.innerHTML = '';

        const chkInd = document.getElementById('chkIndicador');
        const chkQtd = document.getElementById('chkQtdLitros');
        const chkCmp = document.getElementById('chkComparar');

        const showIndicador = chkInd ? chkInd.checked : false;
        const showQtdLitros = chkQtd ? chkQtd.checked : false;
        const showComparar = chkCmp ? chkCmp.checked : false;

        let temFrete = false;
        let temLitros = false;
        
        bancoDados.forEach(p => {
            if(p.linhas && Array.isArray(p.linhas)) {
                p.linhas.forEach(l => { 
                    if (l.frete > 0) temFrete = true; 
                    if (l.qtdLitros && l.qtdLitros > 0) temLitros = true;
                });
            }
        });

        // Ocultar a coluna QTD LITROS na impressão caso não se deseje calcular lucro
        const clsLitrosPrint = showQtdLitros ? "" : "no-print";

        // Contagem de Colunas
        let totalColunas = 9; 
        if (temFrete) totalColunas++;
        if (temLitros) totalColunas++;
        if (showQtdLitros) totalColunas++;
        if (showQtdLitros && showComparar) totalColunas++;

        let theadHTML = `
            <tr>
                <th rowspan="2" style="width: 12%;">DESCRIÇÃO DO PRODUTO</th>
                <th rowspan="2" style="width: 14%;">PERÍODO<br>(1º P. COMPRA 2º P. VENDA)</th>
                <th style="width: 10%;">[A]</th>
        `;
        if (temFrete) theadHTML += `<th style="width: 10%;">[Frete]</th>`;
        theadHTML += `
                <th style="width: 10%;">[B]</th>
                <th style="width: 12%;">${temFrete ? '[C]= [B]-[A]-[Frete]' : '[C]= [B]-[A]'}</th>
                <th style="width: 11%;">[D]= [C]/[B]</th>
                <th style="width: 12%;">[E]=[D]-[D] Per. Base</th>
                <th rowspan="2" style="width: 5%;">% DE REAJUSTE</th>
        `;

        if (temLitros) theadHTML += `<th rowspan="2" class="${clsLitrosPrint}" style="width: 7%;">QTD LITROS</th>`;
        if (showQtdLitros) theadHTML += `<th rowspan="2" style="width: 10%; color: var(--primary-color);">LUCRO ESTIMADO P/<br>QTD LITROS</th>`;
        if (showQtdLitros && showComparar) theadHTML += `<th rowspan="2" style="width: 10%;">COMPARAÇÃO<br>DE PERÍODO</th>`;
        
        theadHTML += `
                <th rowspan="2" class="no-print" style="width: 5px; border: none; background: transparent;"></th>
            </tr>
            <tr>
                <th>PREÇO DE AQUISIÇÃO<br>(R$/UNID.)</th>
        `;
        if (temFrete) theadHTML += `<th>Preço do Frete<br>(R$/UNID.)</th>`;
        theadHTML += `
                <th>PREÇO DE VENDA<br>(R$/UNID.)</th>
                <th>MARGEM DE LUCRO BRUTA<br>ESTIMADA (R$/UNID.)</th>
                <th>MARGEM DE LUCRO BRUTA<br>ESTIMADA (%)</th>
                <th>AUMENTO OU REDUÇÃO DA<br>MARGEM (%)</th>
            </tr>
        `;
        sheetTableHead.innerHTML = theadHTML;

        if(bancoDados.length === 0) {
            sheetTableBody.innerHTML = `<tr><td colspan="${totalColunas}" style="text-align:center; color:#999; padding:20px;">Nenhum produto lançado. Use os painéis acima para começar.</td></tr>`;
            return;
        }

        const fMoeda = (v, vazia) => vazia ? '-' : 'R$ ' + (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
        const fMoeda2 = (v, vazia) => vazia ? '-' : 'R$ ' + (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fPct = (v, vazia) => vazia ? '-' : ((Number(v) || 0) * 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
        const fPctE = (v, vazia) => {
            if (vazia) return '-';
            let num = Number(v) || 0;
            const sinal = num > 0 ? '+' : '';
            return sinal + (num * 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
        };

        bancoDados.forEach((prod) => {
            if (prod.linhas.length >= 0) {
                let selectHtml = '';
                if (showQtdLitros && showComparar && prod.linhas.length > 0) {
                    const nomeSafe = prod.nome.replace(/'/g, "\\'");
                    selectHtml = `<select class="select-compare no-print" onchange="setPeriodoComparacao('${nomeSafe}', this.value)">
                        <option value="">-- Período para comparar --</option>
                        ${prod.linhas.map(l => `<option value="${l.periodo}" ${prod.periodoComparacao === l.periodo ? 'selected' : ''}>Base: ${l.periodo}</option>`).join('')}
                    </select>`;
                }
                const rowHeader = document.createElement('tr');
                rowHeader.className = "product-header-row";
                rowHeader.innerHTML = `<td colspan="${totalColunas - 1}"><b>${prod.nome}</b> ${selectHtml}</td><td class="no-print actions-cell"></td>`;
                sheetTableBody.appendChild(rowHeader);
            }

            let minC = Infinity, maxC = -Infinity, minD = Infinity, maxD = -Infinity;
            if (showIndicador) {
                prod.linhas.forEach(l => {
                    const isVazia = (l.isAquisicaoVazia === true || l.isVendaVazia === true);
                    if (!isVazia) {
                        let lc = Number(l.lucroBrutoC) || 0;
                        let md = Number(l.margemD) || 0;
                        if (lc < minC) minC = lc;
                        if (lc > maxC) maxC = lc;
                        if (md < minD) minD = md;
                        if (md > maxD) maxD = md;
                    }
                });
            }

            let baseRow = null;
            if (showQtdLitros && showComparar && prod.periodoComparacao) {
                baseRow = prod.linhas.find(l => l.periodo === prod.periodoComparacao);
            }

            let sumQtdLitros = 0;
            let sumLucroTotal = 0;
            let sumDiff = 0;

            prod.linhas.forEach(lin => {
                const tr = document.createElement('tr');
                const isVazia = (lin.isAquisicaoVazia === true || lin.isVendaVazia === true);
                if (isVazia) tr.classList.add('linha-incompleta');

                let lc = Number(lin.lucroBrutoC) || 0;
                let md = Number(lin.margemD) || 0;

                let styleC = '', styleD = '';
                if (showIndicador && !isVazia) {
                    styleC = getGradientStyle(lc, minC, maxC);
                    styleD = getGradientStyle(md, minD, maxD);
                }

                let aumE = Number(lin.aumentoReducaoE) || 0;
                let colCorE = aumE > 0 ? 'green' : (aumE < 0 ? 'red' : 'black');
                let tdFrete = temFrete ? `<td>${lin.frete > 0 ? fMoeda(lin.frete, false) : '-'}</td>` : '';
                
                let qLitros = Number(lin.qtdLitros) || 0;
                sumQtdLitros += qLitros;

                let tdLitrosHtml = temLitros ? `<td class="${clsLitrosPrint}">${qLitros > 0 ? qLitros.toLocaleString('pt-BR') : '-'}</td>` : '';
                
                let tdQtd = '', tdComp = '';
                if (showQtdLitros) {
                    let lucroTotal = isVazia ? 0 : (qLitros * lc);
                    if (!isVazia) sumLucroTotal += lucroTotal;
                    tdQtd = `<td style="font-weight: 500;">${(isVazia || qLitros === 0) ? '-' : fMoeda2(lucroTotal, false)}</td>`;
                }

                if (showQtdLitros && showComparar) {
                    if (isVazia || !baseRow || qLitros === 0) {
                        tdComp = `<td>-</td>`;
                    } else {
                        let lucroAtual = qLitros * lc;
                        let baseLucroAbsoluto = (Number(baseRow.qtdLitros)||0) * (Number(baseRow.lucroBrutoC)||0);
                        let diff = lucroAtual - baseLucroAbsoluto;
                        sumDiff += diff;
                        let corDiff = diff > 0 ? 'green' : (diff < 0 ? 'red' : 'black');
                        let sinal = diff > 0 ? '+' : '';
                        tdComp = `<td style="color: ${corDiff}; font-weight: bold;">${sinal}${fMoeda2(diff, false)}</td>`;
                    }
                }

                const nomeSafeBotao = prod.nome.replace(/'/g, "\\'");

                tr.innerHTML = `
                    <td>${lin.docId || ''}</td>
                    <td>${lin.periodo || ''}</td>
                    <td>${fMoeda(lin.aquisicao, lin.isAquisicaoVazia)}</td>
                    ${tdFrete}
                    <td>${fMoeda2(lin.venda, lin.isVendaVazia)}</td>
                    <td style="${styleC}">${fMoeda(lc, isVazia)}</td>
                    <td style="${styleD}">${fPct(md, isVazia)}</td>
                    <td style="color: ${colCorE}; font-weight: ${colCorE !== 'black' ? 'bold' : 'normal'}">${fPctE(aumE, isVazia)}</td>
                    <td>${fPct(lin.percentualReajuste, isVazia)}</td>
                    ${tdLitrosHtml}
                    ${tdQtd}
                    ${tdComp}
                    <td class="no-print actions-cell">
                        <button type="button" class="btn-edit" style="padding:2px 6px; font-size:0.8em; margin-right:4px;" onclick="editarLinha('${nomeSafeBotao}', ${lin.id})">✏️</button>
                        <button type="button" class="btn-danger" style="padding:2px 6px; font-size:0.8em;" onclick="removerLinha('${nomeSafeBotao}', ${lin.id})">X</button>
                    </td>
                `;
                sheetTableBody.appendChild(tr);
            });

            if (prod.linhas.length > 0) {
                const qtd = prod.linhas.length;
                const avgAquisicao = prod.linhas.reduce((acc, l) => acc + (Number(l.aquisicao)||0), 0) / qtd;
                const avgFrete = prod.linhas.reduce((acc, l) => acc + (Number(l.frete)||0), 0) / qtd;
                const avgVenda = prod.linhas.reduce((acc, l) => acc + (Number(l.venda)||0), 0) / qtd;
                const avgC = prod.linhas.reduce((acc, l) => acc + (Number(l.lucroBrutoC)||0), 0) / qtd;
                const avgD = prod.linhas.reduce((acc, l) => acc + (Number(l.margemD)||0), 0) / qtd;
                const avgE = prod.linhas.reduce((acc, l) => acc + (Number(l.aumentoReducaoE)||0), 0) / qtd;
                const avgReajuste = prod.linhas.reduce((acc, l) => acc + (Number(l.percentualReajuste)||0), 0) / qtd;

                const trMedia = document.createElement('tr');
                trMedia.className = 'media-row';
                let tdFreteMedia = temFrete ? `<td>${avgFrete > 0 ? fMoeda(avgFrete, false) : '-'}</td>` : '';
                let tdLitrosMedia = temLitros ? `<td class="${clsLitrosPrint}">${sumQtdLitros > 0 ? sumQtdLitros.toLocaleString('pt-BR') : '-'}</td>` : '';
                
                let tdQtdMedia = '', tdCompMedia = '';
                if (showQtdLitros) {
                    tdQtdMedia = `<td style="color: var(--primary-color);"><b>Σ TOTAL:</b><br>${fMoeda2(sumLucroTotal, false)}</td>`;
                }
                if (showQtdLitros && showComparar) {
                    let corDiff = sumDiff > 0 ? 'green' : (sumDiff < 0 ? 'red' : 'black');
                    let sinal = sumDiff > 0 ? '+' : '';
                    tdCompMedia = `<td style="color: ${corDiff};"><b>Σ DIF:</b><br>${sinal}${fMoeda2(sumDiff, false)}</td>`;
                }

                trMedia.innerHTML = `
                    <td>MÉDIA / TOTAIS</td>
                    <td></td>
                    <td>${fMoeda(avgAquisicao, false)}</td>
                    ${tdFreteMedia}
                    <td>${fMoeda2(avgVenda, false)}</td>
                    <td>${fMoeda(avgC, false)}</td>
                    <td>${fPct(avgD, false)}</td>
                    <td style="color: ${avgE < 0 ? 'red' : (avgE > 0 ? 'green' : 'black')}">${fPctE(avgE, false)}</td>
                    <td>${fPct(avgReajuste, false)}</td>
                    ${tdLitrosMedia}
                    ${tdQtdMedia}
                    ${tdCompMedia}
                    <td class="no-print actions-cell"></td>
                `;
                sheetTableBody.appendChild(trMedia);
            }
        });
    }

    // -------------------------------------------------------------------------
    // RELATÓRIOS (Semanal / Mensal)
    // -------------------------------------------------------------------------
    function gerarRelatorio() {
        if(bancoDados.length === 0) return alert("Não há dados cadastrados para gerar o relatório.");

        let tipoStr = prompt("Digite 'M' para relatório MENSAL ou 'S' para relatório SEMANAL:");
        if(!tipoStr) return;
        let tipo = tipoStr.trim().toUpperCase();
        if(tipo !== 'M' && tipo !== 'S') return alert("Opção inválida. Operação cancelada.");

        let relatorioDados = {};
        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        bancoDados.forEach(prod => {
            if(!Array.isArray(prod.linhas)) return;
            prod.linhas.forEach(l => {
                if(l.isAquisicaoVazia || l.isVendaVazia || !(Number(l.qtdLitros) > 0)) return;
                
                let dateStr = l.periodo || ''; 
                if(!dateStr.includes('/')) return;
                let parts = dateStr.split('/');
                if(parts.length !== 3) return;

                let d = new Date(parts[2], parts[1]-1, parts[0]);
                if(isNaN(d.getFullYear())) return;

                let key = "";
                let labelFormated = "";

                if(tipo === 'M') {
                    // YYYY-MM para ordenação invisível correta
                    key = `${parts[2]}-${parts[1]}`;
                    labelFormated = `${parts[1]}/${parts[2]}`;
                } else {
                    // Semana baseada no MÊS: Dia 1 ao 7 = Sem 1; 8 ao 14 = Sem 2, etc.
                    let diaMes = d.getDate();
                    let semanaMes = Math.ceil(diaMes / 7);
                    let nomeMes = mesesNomes[d.getMonth()];
                    let anoStr = d.getFullYear();
                    
                    key = `${anoStr}-${String(d.getMonth() + 1).padStart(2, '0')}-W${semanaMes}`;
                    labelFormated = `Semana ${semanaMes} de ${nomeMes} de ${anoStr}`;
                }

                if(!relatorioDados[key]) {
                    relatorioDados[key] = { label: labelFormated, produtos: {} };
                }
                if(!relatorioDados[key].produtos[prod.nome]) {
                    relatorioDados[key].produtos[prod.nome] = { litros: 0, lucro: 0 };
                }
                
                let qLitros = Number(l.qtdLitros);
                let luc = Number(l.lucroBrutoC);
                relatorioDados[key].produtos[prod.nome].litros += qLitros;
                relatorioDados[key].produtos[prod.nome].lucro += (qLitros * luc);
            });
        });

        if(Object.keys(relatorioDados).length === 0) {
            return alert("Nenhum lançamento com 'Quant. Litros' foi encontrado para gerar o relatório.");
        }

        let titulo = tipo === 'M' ? "Relatório Mensal de Lucros Estimados" : "Relatório Semanal de Lucros Estimados";
        let inNotificacao = document.getElementById('notificacaoNum');
        let nomeNotificacao = inNotificacao ? inNotificacao.value : "-";

        let html = `
        <html>
        <head>
            <title>${titulo}</title>
            <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; color: #333; }
                h2 { color: #1f4e78; border-bottom: 2px solid #1f4e78; padding-bottom: 5px; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
                th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
                th { background-color: #f2f2f2; color: #1f4e78; }
                .total-row { background-color: #e8f4f8; font-weight: bold; }
                @media print { button { display: none; } }
            </style>
        </head>
        <body>
            <h2>${titulo}</h2>
            <p><b>Notificação n°:</b> ${nomeNotificacao}</p>
            <button onclick="window.print()" style="padding: 10px 15px; background: #1f4e78; color: white; border: none; cursor:pointer; border-radius: 4px; font-weight: bold;">🖨️ Imprimir Relatório</button>
            <table>
                <thead>
                    <tr>
                        <th>Período</th>
                        <th>Produto</th>
                        <th>Total de Litros Lançados</th>
                        <th>Lucro Estimado (R$)</th>
                    </tr>
                </thead>
                <tbody>
        `;

        let totalGeralLucro = 0;
        let periodosOrd = Object.keys(relatorioDados).sort(); 

        periodosOrd.forEach(perKey => {
            let labelPer = relatorioDados[perKey].label;
            let prodsObj = relatorioDados[perKey].produtos;
            let produtosNoPeriodo = Object.keys(prodsObj).sort();
            let subTotalPeriodo = 0;
            
            produtosNoPeriodo.forEach((prodName, idx) => {
                let dados = prodsObj[prodName];
                subTotalPeriodo += dados.lucro;
                
                html += `<tr>`;
                if(idx === 0) {
                    html += `<td rowspan="${produtosNoPeriodo.length}" style="vertical-align:middle; font-weight:bold; background:#fdfdfd;">${labelPer}</td>`;
                }
                html += `
                    <td>${prodName}</td>
                    <td>${dados.litros.toLocaleString('pt-BR')} L</td>
                    <td>R$ ${dados.lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                </tr>`;
            });
            
            totalGeralLucro += subTotalPeriodo;
            html += `<tr class="total-row">
                <td colspan="3" style="text-align: right;"><b>Subtotal (${labelPer}):</b></td>
                <td>R$ ${subTotalPeriodo.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            </tr>`;
        });

        html += `
                </tbody>
                <tfoot>
                    <tr style="background:#1f4e78; color:white; font-size: 1.1em;">
                        <td colspan="3" style="text-align: right;"><b>LUCRO TOTAL GERAL:</b></td>
                        <td><b>R$ ${totalGeralLucro.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</b></td>
                    </tr>
                </tfoot>
            </table>
        </body>
        </html>`;

        let janela = window.open('', '_blank');
        janela.document.write(html);
        janela.document.close();
    }

    // -------------------------------------------------------------------------
    // CRIPTOGRAFIA (SALVAR / IMPORTAR)
    // -------------------------------------------------------------------------
    function salvarDados() {
        const chkInd = document.getElementById('chkIndicador');
        const chkQtd = document.getElementById('chkQtdLitros');
        const chkCmp = document.getElementById('chkComparar');

        const pacoteBackup = {
            notificacao: document.getElementById('notificacaoNum') ? document.getElementById('notificacaoNum').value : '',
            razaoSocial: document.getElementById('razaoSocial') ? document.getElementById('razaoSocial').value : '',
            cnpj: document.getElementById('cnpj') ? document.getElementById('cnpj').value : '',
            endereco: document.getElementById('endereco') ? document.getElementById('endereco').value : '',
            contato: document.getElementById('contato') ? document.getElementById('contato').value : '',
            produtoHeader: document.getElementById('produtoHeader') ? document.getElementById('produtoHeader').value : '',
            bancoDados: bancoDados,
            configs: {
                indicador: chkInd ? chkInd.checked : false,
                qtdLitrosCheck: chkQtd ? chkQtd.checked : false,
                compararCheck: chkCmp ? chkCmp.checked : false
            }
        };

        let jsonString = JSON.stringify(pacoteBackup, null, 2);

        // Prompt de Criptografia
        const desejaSenha = confirm("Deseja proteger este arquivo de backup com uma SENHA?\n\n(OK = Sim. Cancelar = Salvar sem senha)");
        
        if (desejaSenha) {
            const senha = prompt("🔒 Digite a senha para proteger o arquivo:");
            if (!senha) {
                alert("Operação cancelada. A planilha NÃO foi salva.");
                return;
            }
            try {
                const dadosCriptografados = CryptoJS.AES.encrypt(jsonString, senha).toString();
                const pacoteSeguro = {
                    encrypted: true,
                    data: dadosCriptografados
                };
                jsonString = JSON.stringify(pacoteSeguro, null, 2);
            } catch (err) {
                alert("Falha ao criptografar o arquivo.");
                return;
            }
        }

        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const dlAnchorElem = document.createElement('a');
        let txtNotif = pacoteBackup.notificacao || 'Combustivel';
        let numNotif = txtNotif.replace(/[^a-zA-Z0-9]/g, "_");
        
        dlAnchorElem.href = url;
        dlAnchorElem.download = `Planilha_Notificacao_${numNotif}.json`;
        
        document.body.appendChild(dlAnchorElem);
        dlAnchorElem.click();
        document.body.removeChild(dlAnchorElem);
        
        URL.revokeObjectURL(url);
    }

    function acionarImportacao() {
        document.getElementById('importFile').click();
    }

    function importarDados(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let dadosBrutos = JSON.parse(e.target.result);
                
                // Descriptografia
                if (dadosBrutos.encrypted && dadosBrutos.data) {
                    const senha = prompt("🔒 Este arquivo está protegido.\nDigite a senha para abrir:");
                    if (!senha) {
                        alert("Operação cancelada.");
                        input.value = '';
                        return;
                    }
                    
                    const bytes = CryptoJS.AES.decrypt(dadosBrutos.data, senha);
                    const jsonDescriptografado = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (!jsonDescriptografado) {
                        throw new Error("Senha incorreta");
                    }
                    
                    dadosBrutos = JSON.parse(jsonDescriptografado);
                }

                if (dadosBrutos && Array.isArray(dadosBrutos.bancoDados)) {
                    const setVal = (id, val) => { if(document.getElementById(id)) document.getElementById(id).value = val || ''; };
                    
                    setVal('notificacaoNum', dadosBrutos.notificacao);
                    if(document.getElementById('notificacaoNumSpan')) document.getElementById('notificacaoNumSpan').textContent = dadosBrutos.notificacao || '';
                    
                    setVal('razaoSocial', dadosBrutos.razaoSocial);
                    setVal('cnpj', dadosBrutos.cnpj);
                    setVal('endereco', dadosBrutos.endereco);
                    setVal('contato', dadosBrutos.contato);
                    setVal('produtoHeader', dadosBrutos.produtoHeader);
                    
                    bancoDados = dadosBrutos.bancoDados;

                    // Compatibilidade e Higienização de dados velhos
                    bancoDados.forEach(p => {
                        if(!p.periodoComparacao) p.periodoComparacao = '';
                        if(!p.linhas) p.linhas = [];
                        p.linhas.forEach(l => {
                            l.qtdLitros = Number(l.qtdLitros) || 0;
                            l.aquisicao = Number(l.aquisicao) || 0;
                            l.venda = Number(l.venda) || 0;
                            l.frete = Number(l.frete) || 0;
                            l.lucroBrutoC = Number(l.lucroBrutoC) || 0;
                            l.margemD = Number(l.margemD) || 0;
                        });
                    });

                    const setChk = (id, val) => { if(document.getElementById(id)) document.getElementById(id).checked = !!val; };
                    
                    if(dadosBrutos.configs) {
                        setChk('chkIndicador', dadosBrutos.configs.indicador);
                        setChk('chkQtdLitros', dadosBrutos.configs.qtdLitrosCheck);
                        setChk('chkComparar', dadosBrutos.configs.compararCheck);
                    } else {
                        setChk('chkIndicador', false);
                        setChk('chkQtdLitros', false);
                        setChk('chkComparar', false);
                    }
                    
                    atualizarDropdown();
                    atualizarTabela();
                    alert('Planilha carregada com sucesso!');
                } else {
                    alert('Arquivo inválido ou em formato incorreto.');
                }
            } catch (err) {
                if (err.message === "Senha incorreta") {
                    alert('❌ Senha incorreta!');
                } else {
                    alert('Erro ao processar o arquivo. Ele pode estar corrompido.');
                }
            } finally {
                input.value = '';
            }
        };
        reader.readAsText(file);
    }

    function limparTudo() {
        if (confirm('Atenção: Isso apagará todos os produtos e lançamentos. Deseja continuar?')) {
            bancoDados = [];
            atualizarDropdown();
            atualizarTabela();
            cancelarEdicao();
        }
    }

    // Inicialização da tela na abertura
    atualizarTabela();
</script>
